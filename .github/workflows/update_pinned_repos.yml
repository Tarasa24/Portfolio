name: Update Pinned Repos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"  # every Sunday at midnight UTC

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  API_TOKEN: ${{ secrets.API_TOKEN }}
  BASE_BRANCH: master

jobs:
  update_repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git and switch to update branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-pinned-repos || git checkout update-pinned-repos

      - name: Generate Markdown for pinned repos
        working-directory: scripts
        run: |
          python fetch_and_generate.py

      - name: Commit and push changes
        id: commit
        run: |
          git add hugo/content/cs/projects hugo/content/en/projects hugo/static/assets/img/projects
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "Update pinned repos markdown"
          git push -u origin HEAD --force
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create PR and merge
        if: steps.commit.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update pinned repos markdown"
          base: master
          branch: update-pinned-repos
          title: "Update pinned repos markdown"
          body: "Automatic update of pinned repositories"
          labels: automated
